name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Lint & Format
        run: pnpm exec biome ci .

      - name: Type check
        run: pnpm exec tsc --noEmit